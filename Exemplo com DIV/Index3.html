<html>
    <head>
      <title>Exemplo com DIV</title> 
      <link href="Estilo3.css" rel="stylesheet" type="text/css">
    </head>
     <body>
          
          <div class="divStatic">
               Alinhamento static
          </div>
          
          <div class="divAlignCenter">
               Alinhado ao centro
          </div>
          
          <div class="divSticky">
               Alinhamento sticky
          </div>
          
          <div class="divAlignRelative">
               Posicionamento relativo
          </div>
          
          <div class="divAlignLeft">
               Alinhado a esquerda
          </div>
     
          <div class="divAlignRight">
               Alinhado a direita
          </div>
     
          <div class="divAlignFixed">
               Alinhamento fixo
          </div>
          
          <div class="divAbsolute">
               Alinhamento absolute
          </div>
     
         
     </body>

</html>
