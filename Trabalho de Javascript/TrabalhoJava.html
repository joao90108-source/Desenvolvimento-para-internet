<!DOCTYPE html>
</html>
<head>
    <title>Encontre o triângulo</title>
</head>
<link href="TrabalhoJava.css" rel="stylesheet" type="text/css">
<body>
<div class="exercicio"><span class="Ex1"><label for="ValorX">Valor x:</label>
<input id="ValorX" type="number" placeholder="Informe o valor X">
<label for="ValorY">Valor Y:</label>
<input id="ValorY" type="number" placeholder="Informe o valor Y">
<label for="ValorZ">Valor Z:</label>
<input id="ValorZ" type="number" placeholder="Informe o valor Z">
<label for="ResultadoDoCalculo" placeholder="Informe o valor X"></label></span>
<button id="ResultadoDoCalculo1" type="text" placeholder="Resultado do cálculo">Resultado do cálculo</button>
<h3 id="h3Resultado1"></h3></div>
<br>
<hr>
<div class="exercicio2"><span class="Ex2"><label for="CampoParaPeso">Peso:</label>
<input id="CampoParaPeso" type="number" placeholder="Peso (kg)">
<label for="CampoParaAltura">Altura:</label>
<input id="CampoParaAltura" type="number" placeholder="Altura (m)">
<label for="ResultadoDoCalculo" placeholder="Resultado do cálculo"></label>
<button id="ResultadoDoCalculo2" type="button" placeholder="Resultado do cálculo">Resultado do cálculo</button>
<h3 id="h3Resultado2"></h3></div>
<br>
<hr>
<div class="exercicio3"><span class="Ex3"><label for="AnoDoCarro">Ano em que o carro foi fabricado:</label>
<input id="AnoDoCarro" type="number" placeholder="Ano de fabricacao">
<label for="ValorDoCarro">Valor do carro foi fabricado:</label>
<input id="ValorDoCarro" type="number" placeholder="Valor do carro fabricado">
<label for="Imposto" placeholder="Imposto a ser pago"></label></span>
<button id="Imposto" type="button" placeholder="Imposto a ser pago">Imposto</button>
<h3 id="h3Resultado3"></h3></div>
<br>
<hr>
<div class="exercicio4"><span class="Ex4"><label for="SalarioDoFuncionario">Salário:</label>
<input id="SalarioDoFuncionario" type="number" placeholder="Salario do funcionario">
<label for="CampoCodigo">Código:</label>
<input id="CampoCodigo" type="text" placeholder="Codigo do cargo">
<label for="NovoSalario" placeholder="Novo salario"></label></span>
<button id="NovoSalario" type="button" placeholder="Resultado do cálculo">Resultado do cálculo</button>
<h3 id="h3Resultado4"></h3></div>
<br>
<hr>
<div class="exercicio5"><span class="Ex5"><label for="SaldoMedio">Saldo medio do cliente:</label>
<input id="SaldoMedio" type="number" placeholder="Saldo medio">
<label for="SaldoValor"></label>
<button id="SaldoValor" type="button" placeholder="Saldo medio e valor do credito">Valor</button></span>
<h3 id="h3Resultado5"></h3></div>
<br>
<hr>
<div class="exercicio6"><span class="Ex6"><label for="CodigoDoItem">Codigo:</label>
<input id="CodigoDoItem" type="number" placeholder="Codigo do pedido">
<label for="QuantidadeDoItem">Quantidade:</label>
<input id="QuantidadeDoItem" type="number" placeholder="Quantidade do pedido"></span>
<button id="ValorDaCompra" type="button" placeholder="Saldo medio e valor do credito">Valor</button>
<h3 id="h3Resultado6"></h3></div>
<br>
<hr>
<div class="exercicio7"><span class="Ex7"><label for="PrecoProduto">Preco do produto:</label>
<input id="PrecoProduto" type="number">
<label for="CodigoPagamento">Codigo do pagamento:</label>
<input id="CodigoPagamento" type="text">
<label for="ResultadoDoCalculo" placeholder="Informe o valor X"></label></span>
<button id="ResultadoDoCalculo" type="text" placeholder="Resultado do cálculo">Resultado do cálculo</button>
<h3 id="h3Resultado7"></h3></div>
<br>
<hr>
<div class="exercicio8"><span class="Ex8"><label for="NivelProfessor">Nivel do professor:</label>
<input id="NivelProfessor" type="number" placeholder="Nivel (1, 2 e 3)">
<label for="HoraAula"> Horas/aulas por semana</label>
<input id="HoraAula" type="text" placeholder="Horas/aulas por semana:">
<label for="Salario" placeholder="Salario do professor"></label></span>
<button id="Salario" type="text" placeholder="Resultado do calculo">Resultado do calculo</button>
<h3 id="h3Resultado8"></h3></div>

</body>
<script src="PrimeiroTriângulo.js"></script>
</html>
